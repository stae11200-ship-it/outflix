<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
  <!-- PWA / 아이패드 전체화면 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="OURFLIX">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=1180, viewport-fit=cover">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="OURFLIX">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">

<meta name="viewport" content="width=1180, viewport-fit=cover">
<title>OURFLIX</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
:root {
  --red:#E50914; --bg:#141414; --bg2:#1a1a1a;
  --card:#2a2a2a; --text:#fff; --text2:#b3b3b3; --border:#333;
}
html,body {
  width:1180px; height:820px; overflow:hidden;
  background:var(--bg); font-family:'Noto Sans KR',sans-serif;
  color:var(--text); user-select:none;
}
.screen { position:absolute; inset:0; width:1180px; height:820px; display:none; }
.screen.active { display:flex; animation:fadeIn .3s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* ── 프로필 선택 ── */
#screen-profile {
  flex-direction:column; align-items:center; justify-content:flex-end;
  padding-bottom:80px;
  background:radial-gradient(ellipse at 50% 0%, #3a0505 0%, #1a0303 40%, #0a0a0a 100%);
}
.profile-logo {
  position:absolute; top:40px; left:50%; transform:translateX(-50%);
  font-family:'Anton',sans-serif; font-size:48px; color:var(--red); letter-spacing:3px;
}
.profile-title { font-size:28px; font-weight:400; color:var(--text); margin-bottom:48px; letter-spacing:-.3px; }
.profiles { display:flex; gap:36px; align-items:flex-end; }
.profile-item { display:flex; flex-direction:column; align-items:center; gap:12px; cursor:pointer; transition:transform .15s; }
.profile-item:hover { transform:scale(1.06); }
.profile-item:hover .profile-name { color:#fff; }
.profile-item.disabled { pointer-events:none; }

.profile-avatar {
  width:140px; height:140px; border-radius:8px;
  border:3px solid transparent; transition:border-color .15s;
  overflow:hidden; display:flex; align-items:center; justify-content:center;
}
.profile-item:hover .profile-avatar { border-color:#fff; }
.profile-avatar.taewoong {
  background:#1a3a6e; opacity:.38;
  font-size:70px; line-height:1;
}
.profile-avatar.jiwon img { width:100%; height:100%; object-fit:cover; object-position:top center; }
.profile-name { font-size:15px; color:var(--text2); }
.profile-item.disabled .profile-name { color:#555; }

/* ── 메인 홈 ── */
#screen-home { flex-direction:column; overflow:hidden; }

/* 헤더 */
.hdr {
  position:absolute; top:0; left:0; right:0; z-index:100; height:60px;
  display:flex; align-items:center; padding:0 36px;
  background:linear-gradient(180deg,rgba(0,0,0,.9) 0%,transparent 100%);
}
.hdr-logo { font-family:'Anton',sans-serif; font-size:32px; color:var(--red); letter-spacing:2px; margin-right:32px; flex-shrink:0; }
.hdr-nav { display:flex; gap:20px; flex:1; }
.hdr-nav a { font-size:14px; color:var(--text2); cursor:pointer; transition:color .15s; }
.hdr-nav a:first-child { color:#fff; font-weight:700; }
.hdr-nav a:hover { color:#fff; }
.hdr-right { display:flex; align-items:center; gap:18px; }
.hdr-icon { font-size:19px; color:var(--text2); cursor:pointer; }
.hdr-pfp { width:30px; height:30px; border-radius:4px; overflow:hidden; }
.hdr-pfp img { width:100%; height:100%; object-fit:cover; object-position:top; }

/* 히어로 */
.hero { width:100%; height:460px; position:relative; flex-shrink:0; overflow:hidden; }
.hero-bg { position:absolute; inset:0; background:linear-gradient(135deg,#0d1520 0%,#1a0a1a 50%,#0a1a0d 100%); }
.hero-grid { position:absolute; right:0; top:0; bottom:0; width:58%; display:grid; grid-template-columns:repeat(4,1fr); grid-template-rows:repeat(3,1fr); gap:3px; opacity:.35; }
.hg { background:var(--card); border-radius:2px; }
.hg:nth-child(1){background:linear-gradient(135deg,#8B4513,#2d1b0e)}
.hg:nth-child(2){background:linear-gradient(135deg,#1a3a5c,#0d1a2e)}
.hg:nth-child(3){background:linear-gradient(135deg,#3a1a3a,#1a0d1a)}
.hg:nth-child(4){background:linear-gradient(135deg,#1a3a1a,#0d1a0d)}
.hg:nth-child(5){background:linear-gradient(135deg,#3a3a1a,#1a1a0d)}
.hg:nth-child(6){background:linear-gradient(135deg,#5c1a1a,#2e0d0d)}
.hg:nth-child(7){background:linear-gradient(135deg,#1a2a3a,#0d1520)}
.hg:nth-child(8){background:linear-gradient(135deg,#2a1a2a,#150d15)}
.hg:nth-child(9){background:linear-gradient(135deg,#1a3a2a,#0d1a15)}
.hg:nth-child(10){background:linear-gradient(135deg,#3a2a1a,#1a150d)}
.hg:nth-child(11){background:linear-gradient(135deg,#2a3a1a,#151a0d)}
.hg:nth-child(12){background:linear-gradient(135deg,#1a1a3a,#0d0d1a)}
.hero-gl { position:absolute; inset:0; background:linear-gradient(90deg,rgba(20,20,20,1) 0%,rgba(20,20,20,.85) 35%,rgba(20,20,20,.1) 75%,transparent 100%); }
.hero-gb { position:absolute; bottom:0; left:0; right:0; height:160px; background:linear-gradient(0deg,rgba(20,20,20,1) 0%,transparent 100%); }
.hero-content { position:absolute; bottom:70px; left:48px; max-width:440px; }
.hero-badge { display:inline-flex; align-items:center; gap:5px; background:rgba(229,9,20,.12); border:1px solid rgba(229,9,20,.35); border-radius:3px; padding:3px 9px; font-size:10px; font-weight:700; color:var(--red); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:12px; }
.hero-title { font-family:'Anton',sans-serif; font-size:68px; line-height:.95; color:#fff; letter-spacing:-1px; margin-bottom:12px; text-shadow:0 2px 20px rgba(0,0,0,.8); }
.hero-title span { color:var(--red); display:block; }
.hero-desc { font-size:13px; color:var(--text2); line-height:1.6; margin-bottom:20px; font-weight:300; }
.hero-btns { display:flex; gap:8px; }
.btn-play { display:flex; align-items:center; gap:7px; background:#fff; color:#000; border:none; border-radius:4px; padding:10px 22px; font-size:15px; font-weight:700; cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:background .15s; }
.btn-play:hover { background:rgba(255,255,255,.85); }
.btn-info { display:flex; align-items:center; gap:7px; background:rgba(109,109,110,.65); color:#fff; border:none; border-radius:4px; padding:10px 18px; font-size:15px; font-weight:500; cursor:pointer; font-family:'Noto Sans KR',sans-serif; }
.btn-info:hover { background:rgba(109,109,110,.45); }

/* 콘텐츠 영역 */
.content { flex:1; overflow-y:auto; overflow-x:hidden; padding:0 0 56px; margin-top:-50px; position:relative; z-index:10; scrollbar-width:none; }
.content::-webkit-scrollbar { display:none; }
.row { margin-bottom:4px; }
.row-title { font-size:17px; font-weight:700; color:var(--text); padding:0 46px; margin-bottom:8px; letter-spacing:-.3px; }
.row-cards { display:flex; gap:7px; padding:4px 46px; overflow-x:auto; scrollbar-width:none; }
.row-cards::-webkit-scrollbar { display:none; }

/* 에피소드 카드 */
.ep-card { flex-shrink:0; width:297px; height:167px; border-radius:4px; overflow:hidden; cursor:pointer; position:relative; transition:transform .2s ease, box-shadow .2s ease; background:var(--card); }
.ep-card:hover { transform:scale(1.06); box-shadow:0 8px 28px rgba(0,0,0,.8); z-index:10; }
.ep-card-bg { position:absolute; inset:0; background-size:cover; background-position:center; transition:transform .3s ease; }
.ep-card:hover .ep-card-bg { transform:scale(1.05); }
.ep-card-gr { position:absolute; inset:0; background:linear-gradient(180deg,transparent 25%,rgba(0,0,0,.65) 65%,rgba(0,0,0,.92) 100%); }
.ep-card-info { position:absolute; bottom:0; left:0; right:0; padding:8px 10px; }
.ep-num { font-size:9px; font-weight:700; color:var(--red); letter-spacing:2px; text-transform:uppercase; margin-bottom:2px; }
.ep-tit { font-size:14px; font-weight:700; color:#fff; letter-spacing:-.2px; }
.ep-sub { font-size:10px; color:var(--text2); margin-top:1px; font-weight:300; }
.ep-unknown-mid { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; }
.ep-unknown-mid .ico { font-size:24px; opacity:.25; }
.ep-unknown-mid .lbl { font-size:10px; color:#555; letter-spacing:2px; text-transform:uppercase; }

/* 세로 카드 */
.v-card { flex-shrink:0; width:176px; height:265px; border-radius:4px; cursor:pointer; position:relative; transition:transform .2s ease, box-shadow .2s ease; }
.v-card:hover { transform:scale(1.06); box-shadow:0 8px 28px rgba(0,0,0,.8); z-index:10; }

/* 하단 탭 */
.tabbar { position:absolute; bottom:0; left:0; right:0; height:58px; background:rgba(20,20,20,.98); border-top:1px solid #2a2a2a; display:flex; align-items:center; justify-content:center; gap:70px; z-index:200; }
.tab-item { display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; opacity:.55; transition:opacity .15s; }
.tab-item.active { opacity:1; }
.tab-icon { font-size:20px; }
.tab-lbl { font-size:10px; color:var(--text2); }
.tab-item.active .tab-lbl { color:#fff; }
.tab-dot { width:4px; height:4px; border-radius:50%; background:var(--red); margin-top:-2px; }

/* 에피소드 플레이스홀더 */
#screen-ep1,#screen-ep2,#screen-ep3,#screen-propose {
  background:#000; align-items:center; justify-content:center; flex-direction:column;
}
.ep-back { position:absolute; top:24px; left:36px; font-size:26px; cursor:pointer; color:var(--text2); z-index:100; transition:color .15s; }
.ep-back:hover { color:#fff; }

/* ── 에피소드 상세 화면 (솔로지옥 스타일) ── */
.detail-screen {
  flex-direction: column;
  background: var(--bg);
  overflow: hidden;
}

.detail-backdrop {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 340px;
  background: var(--card);
  overflow: hidden;
  flex-shrink: 0;
}

.detail-backdrop video {
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0.85;
}

.detail-backdrop-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
}

.detail-backdrop-grad {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 120px;
  background: linear-gradient(0deg, var(--bg) 0%, transparent 100%);
}

.detail-backdrop-top {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 60px;
  background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 16px;
}

.detail-badge {
  background: rgba(229,9,20,0.9);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 2px;
  letter-spacing: 1px;
}

.detail-back {
  color: #fff;
  font-size: 22px;
  cursor: pointer;
  opacity: 0.8;
  transition: opacity .15s;
  margin-right: 4px;
}
.detail-back:hover { opacity: 1; }

.detail-close {
  margin-left: auto;
  color: #fff;
  font-size: 22px;
  cursor: pointer;
  opacity: 0.8;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  transition: background .15s;
}
.detail-close:hover { background: rgba(255,255,255,0.2); }

.detail-content {
  position: absolute;
  top: 280px;
  left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  scrollbar-width: none;
  padding: 0 28px 40px;
  z-index: 10;
}
.detail-content::-webkit-scrollbar { display: none; }

.detail-title {
  font-family: 'Anton', sans-serif;
  font-size: 34px;
  color: #fff;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.detail-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.detail-meta-year {
  font-size: 13px;
  color: #46d369;
  font-weight: 700;
}

.detail-meta-rating {
  border: 1px solid #888;
  border-radius: 2px;
  padding: 1px 6px;
  font-size: 11px;
  color: #888;
}

.detail-meta-ep {
  font-size: 13px;
  color: var(--text2);
}

.detail-meta-hd {
  border: 1px solid #888;
  border-radius: 2px;
  padding: 1px 5px;
  font-size: 10px;
  color: #888;
  font-weight: 700;
}

.detail-btns {
  display: flex;
  gap: 10px;
  margin-bottom: 18px;
}

.detail-btn-play {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: #fff;
  color: #000;
  border: none;
  border-radius: 4px;
  padding: 12px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: background .15s;
}
.detail-btn-play:hover { background: rgba(255,255,255,0.85); }

.detail-btn-save {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: rgba(109,109,110,0.5);
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 12px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}

.detail-desc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.65;
  margin-bottom: 16px;
  font-weight: 300;
}

.detail-info {
  font-size: 12px;
  color: #555;
  line-height: 1.8;
  margin-bottom: 20px;
}

.detail-info span { color: #888; }

.detail-actions {
  display: flex;
  gap: 0;
  margin-bottom: 22px;
  border-top: 1px solid #2a2a2a;
  border-bottom: 1px solid #2a2a2a;
  padding: 4px 0;
}

.detail-action-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 12px 8px;
  cursor: pointer;
  opacity: 0.7;
  transition: opacity .15s;
}
.detail-action-item:hover { opacity: 1; }

.detail-action-icon { font-size: 20px; }
.detail-action-lbl { font-size: 10px; color: var(--text2); letter-spacing: 0.5px; }

.detail-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid #2a2a2a;
  margin-bottom: 16px;
}

.detail-tab {
  padding: 10px 18px;
  font-size: 13px;
  color: #666;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color .15s;
  font-weight: 400;
}

.detail-tab.active {
  color: #fff;
  border-bottom-color: var(--red);
  font-weight: 700;
}

.detail-ep-item {
  display: flex;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid #1a1a1a;
  cursor: pointer;
  transition: background .15s;
  border-radius: 4px;
}
.detail-ep-item:hover { background: rgba(255,255,255,0.04); }

.detail-ep-thumb {
  width: 130px;
  height: 74px;
  border-radius: 4px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  overflow: hidden;
}

.detail-ep-info { flex: 1; }
.detail-ep-num { font-size: 10px; color: var(--red); font-weight: 700; letter-spacing: 1.5px; margin-bottom: 3px; }
.detail-ep-title { font-size: 14px; color: #fff; font-weight: 600; margin-bottom: 4px; }
.detail-ep-desc { font-size: 11px; color: #555; line-height: 1.5; font-weight: 300; }


/* ── PIN 잠금 화면 ── */
#screen-pin {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at 50% 30%, #2a0a0a 0%, #150505 40%, #080808 100%);
}

.pin-modal {
  background: rgba(210,210,210,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 14px;
  padding: 28px 32px 0;
  width: 320px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

.pin-title {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #000;
  text-align: center;
  margin-bottom: 20px;
  line-height: 1.5;
}

.pin-boxes {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 20px;
}

.pin-box {
  width: 60px;
  height: 60px;
  background: #fff;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 900;
  color: #000;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  transition: background 0.1s;
}

.pin-box.filled { background: #fff; }
.pin-box.active { background: #e8e8e8; }

.pin-divider {
  height: 1px;
  background: rgba(0,0,0,0.15);
  margin: 0 -32px;
}

.pin-forgot {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  color: #007AFF;
  text-align: center;
  padding: 16px;
  cursor: pointer;
  font-weight: 400;
}

.pin-divider2 {
  height: 1px;
  background: rgba(0,0,0,0.15);
  margin: 0 -32px;
}

.pin-cancel {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  color: #007AFF;
  text-align: center;
  padding: 16px;
  cursor: pointer;
  font-weight: 400;
}

.pin-shake {
  animation: pinShake 0.4s ease;
}

@keyframes pinShake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}

/* 숨겨진 키보드 입력 */
#pinInput {
  position: absolute;
  opacity: 0;
  width: 1px;
  height: 1px;
  pointer-events: none;
}





/* ── 오프닝 ── */
#screen-opening {
  background: #000;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  cursor: none;
}
</style>
</head>
<body>




<!-- 오프닝 -->
<div id="screen-opening" class="screen active" style="background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;">
  <video id="openingVideo"
    style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;"
    playsinline
    src="videos/opening.mp4">
  </video>
  <div id="openingTap" style="display:flex;flex-direction:column;align-items:center;gap:24px;z-index:10;">
    <div style="font-family:'Arial Black',Arial,sans-serif;font-size:100px;font-weight:900;color:#E50914;letter-spacing:-3px;">OURFLIX</div>
    <div style="font-family:'Noto Sans KR',sans-serif;font-size:16px;color:rgba(255,255,255,0.4);letter-spacing:4px;">TAP TO START</div>
  </div>
</div>

<!-- 프로필 선택 -->
<div id="screen-profile" class="screen">
  <div class="profile-logo">OURFLIX</div>
  <p class="profile-title">프로필을 선택하세요</p>
  <div class="profiles">
